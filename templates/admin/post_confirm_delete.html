{% extends 'admin/base.html' %}

{% block title %}Delete Post - ModernBlog Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Delete Post</h1>
        <p class="text-gray-500 mt-1">Are you sure you want to delete this post?</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-8">
        <div class="flex items-center p-6 bg-red-50 rounded-lg mb-6">
            <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center text-red-600">
                <i class="fas fa-exclamation-triangle text-xl"></i>
            </div>
            <div class="ml-4">
                <p class="font-medium text-gray-900">{{ object.title }}</p>
                <p class="text-sm text-gray-500">This action cannot be undone.</p>
            </div>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="flex items-center gap-4">
                <button type="submit" class="px-6 py-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700 transition">
                    <i class="fas fa-trash mr-2"></i>Delete
                </button>
                <a href="{% url 'admin_post_list' %}" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
