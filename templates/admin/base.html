<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard - ModernBlog{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    {% if messages %}
        <div class="fixed top-4 right-4 z-50 space-y-2">
            {% for message in messages %}
                <div class="px-6 py-3 rounded-lg shadow-lg {% if message.tags == 'success' %}bg-green-500{% elif message.tags == 'error' %}bg-red-500{% else %}bg-blue-500{% endif %} text-white">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white shadow-lg fixed h-full">
            <div class="p-6">
                <a href="{% url 'home' %}" class="text-2xl font-bold text-gray-800">
                    <i class="fas fa-blog mr-2 text-blue-600"></i>ModernBlog
                </a>
                <p class="text-sm text-gray-500 mt-1">Admin Panel</p>
            </div>
            
            <nav class="mt-6 px-4">
                <a href="{% url 'admin_dashboard' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-blue-50 text-blue-600{% else %}hover:bg-gray-50{% endif %}">
                    <i class="fas fa-th-large w-6"></i>
                    <span class="font-medium">Dashboard</span>
                </a>
                
                <a href="{% url 'admin_post_list' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg {% if request.resolver_match.url_name == 'admin_post_list' or request.resolver_match.url_name == 'post_create' or request.resolver_match.url_name == 'post_update' or request.resolver_match.url_name == 'post_delete' %}bg-blue-50 text-blue-600{% else %}hover:bg-gray-50{% endif %}">
                    <i class="fas fa-file-alt w-6"></i>
                    <span class="font-medium">Posts</span>
                </a>
                
                <a href="{% url 'category_list' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg {% if request.resolver_match.url_name == 'category_list' or request.resolver_match.url_name == 'category_create' or request.resolver_match.url_name == 'category_update' or request.resolver_match.url_name == 'category_delete' %}bg-blue-50 text-blue-600{% else %}hover:bg-gray-50{% endif %}">
                    <i class="fas fa-folder w-6"></i>
                    <span class="font-medium">Categories</span>
                </a>
                
                <div class="border-t my-4"></div>
                
                <a href="{% url 'home' %}" class="flex items-center px-4 py-3 text-gray-700 rounded-lg hover:bg-gray-50">
                    <i class="fas fa-globe w-6"></i>
                    <span class="font-medium">View Site</span>
                </a>
            </nav>
            
            <div class="absolute bottom-0 w-64 p-4 border-t">
                <div class="flex items-center">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-gray-900">{{ user.username }}</p>
                        <p class="text-xs text-gray-500">Administrator</p>
                    </div>
                </div>
                <form method="post" action="{% url 'admin_logout' %}" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="w-full flex items-center justify-center px-4 py-2 text-sm text-red-600 border border-red-200 rounded-lg hover:bg-red-50 transition">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </form>
            </div>
        </aside>

        <main class="flex-1 ml-64 p-8">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
