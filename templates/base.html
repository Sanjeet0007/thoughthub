<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Modern Blog{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    {% if messages %}
        <div class="fixed top-4 right-4 z-50 space-y-2">
            {% for message in messages %}
                <div class="px-6 py-3 rounded-lg shadow-lg {% if message.tags == 'success' %}bg-green-500{% elif message.tags == 'error' %}bg-red-500{% else %}bg-blue-500{% endif %} text-white fade-in">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="{% url 'home' %}" class="text-2xl font-bold text-gray-800">
                        <i class="fas fa-blog mr-2 text-blue-600"></i>ModernBlog
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    {% if user.is_staff %}
                        <a href="{% url 'admin_dashboard' %}" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-lg text-sm font-medium transition">
                            <i class="fas fa-cog mr-1"></i>Admin
                        </a>
                    {% endif %}
                    {% if user.is_authenticated %}
                        <form method="post" action="{% url 'admin_logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="text-gray-600 hover:text-red-600 px-3 py-2 rounded-lg text-sm font-medium transition">
                                <i class="fas fa-sign-out-alt mr-1"></i>Logout
                            </button>
                        </form>
                    {% else %}
                        <a href="{% url 'admin_login' %}" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-lg text-sm font-medium transition">
                            <i class="fas fa-user mr-1"></i>Login
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-800 text-white py-8 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-400">&copy; 2026 ModernBlog. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
